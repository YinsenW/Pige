name: Security contact request
description: Request a private channel when GitHub private vulnerability reporting is unavailable.
title: "[Security contact request]"
labels:
  - security
body:
  - type: markdown
    attributes:
      value: |
        Do not include vulnerability details, exploit steps, secrets, screenshots, logs, private files, or payloads in this public issue.

        Use this only to request a private maintainer contact path when GitHub private vulnerability reporting is not available.
  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I have not included vulnerability details or private data in this public issue.
          required: true
        - label: I need a private channel to share security details.
          required: true
