name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.0"
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify docs, manifests, and boundaries
        run: npm run verify

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Generate retrieval regression report
        run: npm run test:eval:report
        env:
          PIGE_REPORT_PLATFORM: linux-x64
          PIGE_REPORT_BUILD_ID: ${{ github.sha }}

      - name: Upload retrieval regression report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: retrieval-regression-${{ github.sha }}
          path: artifacts/test-reports/retrieval-regression/linux-x64/${{ github.sha }}/report.json
          if-no-files-found: error
          retention-days: 14

      - name: Build
        run: npm run build

      - name: Smoke local index rebuild worker
        run: npm run smoke:index-rebuild-worker
