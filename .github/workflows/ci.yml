name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.0"
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test merge candidate or main
        if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-gates')
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify changed-candidate invariants
        run: npm run verify:change

      - name: Verify full governance and repository boundaries
        if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-gates')
        run: npm run verify

      - name: Verify root commands and development Electron launch
        if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-gates')
        run: xvfb-run -a npm run smoke:repository-foundation
        env:
          PIGE_REPORT_BUILD_ID: ${{ github.sha }}
          PIGE_DEVELOPMENT_SMOKE_NO_SANDBOX: "1"

      - name: Upload repository foundation report
        if: always() && (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-gates'))
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: repository-foundation-${{ github.sha }}
          path: artifacts/test-reports/repository-foundation/linux-x64/${{ github.sha }}/report.json
          if-no-files-found: error
          retention-days: 14

      - name: Generate retrieval regression report
        if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-gates')
        run: npm run test:eval:report
        env:
          PIGE_REPORT_PLATFORM: linux-x64
          PIGE_REPORT_BUILD_ID: ${{ github.sha }}

      - name: Upload retrieval regression report
        if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-gates')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: retrieval-regression-${{ github.sha }}
          path: artifacts/test-reports/retrieval-regression/linux-x64/${{ github.sha }}/report.json
          if-no-files-found: error
          retention-days: 14

      - name: Smoke local index rebuild worker
        if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'full-gates')
        run: npm run smoke:index-rebuild-worker
