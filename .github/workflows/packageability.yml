name: Packageability

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package-impact:
    name: Package impact
    runs-on: ubuntu-latest
    outputs:
      required: ${{ steps.classify.outputs.required }}
      reason: ${{ steps.classify.outputs.reason }}
    steps:
      - name: Checkout candidate and base history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Classify package impact from trusted base
        id: classify
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          FORCE_PACKAGE: ${{ contains(github.event.pull_request.labels.*.name, 'package-gates') }}
        run: |
          set -uo pipefail
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            printf 'required=true\nreason=main_or_manual\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$FORCE_PACKAGE" == "true" ]]; then
            printf 'required=true\nreason=explicit_override\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          trusted_classifier="$RUNNER_TEMP/package-impact.mjs"
          changed_paths="$RUNNER_TEMP/package-impact-paths"
          if ! git show "${BASE_SHA}:scripts/verify/package-impact.mjs" > "$trusted_classifier"; then
            printf 'required=true\nreason=trusted_classifier_unavailable\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! git diff --name-only -z "$BASE_SHA" "$HEAD_SHA" -- > "$changed_paths"; then
            printf 'required=true\nreason=diff_failure\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! node "$trusted_classifier" --paths-file="$changed_paths" --format=github-output >> "$GITHUB_OUTPUT"; then
            printf 'required=true\nreason=classifier_failure\n' >> "$GITHUB_OUTPUT"
          fi

  macos-arm64:
    name: macOS 26 arm64 packageability
    needs: package-impact
    if: needs.package-impact.outputs.required == 'true'
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.0"
          cache: npm

      - name: Install
        run: npm ci

      - name: Audit packaged runtime dependencies
        run: npm audit --omit=dev

      - name: Build unsigned macOS arm64 artifact
        run: npm run package:dir:mac:arm64

      - name: Smoke packaged application
        run: npm run smoke:packaged:mac:arm64
        env:
          PIGE_REPORT_BUILD_ID: ${{ github.sha }}

      - name: Upload packageability evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pige-macos-arm64-packageability-${{ github.sha }}
          path: |
            artifacts/release-packageability/macos-arm64/Pige-0.0.0-arm64.zip
            artifacts/release-packageability/macos-arm64/Pige-0.0.0-arm64.zip.blockmap
            artifacts/test-reports/packageability/macos-arm64/${{ github.sha }}/report.json
          if-no-files-found: error
          retention-days: 14

  macos-arm64-distribution:
    name: macOS 26 arm64 downloaded distribution
    needs: macos-arm64
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout verifier
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.0"
          cache: npm

      - name: Install verifier dependencies
        run: npm ci

      - name: Download electron-builder distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pige-macos-arm64-packageability-${{ github.sha }}
          path: artifacts

      - name: Verify downloaded macOS distribution
        run: npm run smoke:distributed:mac:arm64
        env:
          PIGE_REPORT_BUILD_ID: ${{ github.sha }}-distribution
          PIGE_EXPECTED_PACKAGEABILITY_REPORT: artifacts/test-reports/packageability/macos-arm64/${{ github.sha }}/report.json

      - name: Upload independent distribution evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pige-macos-arm64-distribution-verification-${{ github.sha }}
          path: artifacts/test-reports/packageability/macos-arm64/${{ github.sha }}-distribution/report.json
          if-no-files-found: error
          retention-days: 14

  windows-x64:
    name: Windows x64 packageability
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-2025
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.0"
          cache: npm

      - name: Install
        run: npm ci

      - name: Audit packaged runtime dependencies
        run: npm audit --omit=dev

      - name: Build unsigned Windows x64 artifact
        run: npm run package:dir:win:x64

      - name: Smoke packaged application
        run: npm run smoke:packaged:win:x64
        env:
          PIGE_REPORT_BUILD_ID: ${{ github.sha }}

      - name: Upload packageability evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pige-windows-x64-packageability-${{ github.sha }}
          path: |
            artifacts/release-packageability/windows-x64/Pige-0.0.0-x64-setup.exe
            artifacts/test-reports/packageability/windows-x64/${{ github.sha }}/report.json
          if-no-files-found: error
          retention-days: 14
