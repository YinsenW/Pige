name: Packageability

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  macos-arm64:
    name: macOS 26 arm64 packageability
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.0"
          cache: npm

      - name: Install
        run: npm ci

      - name: Audit packaged runtime dependencies
        run: npm audit --omit=dev

      - name: Build unsigned macOS arm64 artifact
        run: npm run package:dir:mac:arm64

      - name: Smoke packaged application
        run: npm run smoke:packaged:mac:arm64
        env:
          PIGE_REPORT_BUILD_ID: ${{ github.sha }}

      - name: Measure packaged application memory
        run: npm run evidence:packaged-memory:mac:arm64
        env:
          PIGE_REPORT_BUILD_ID: ${{ github.sha }}

      - name: Upload packageability evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pige-macos-arm64-packageability-${{ github.sha }}
          path: |
            artifacts/release-packageability/macos-arm64/Pige-0.0.0-arm64.zip
            artifacts/release-packageability/macos-arm64/Pige-0.0.0-arm64.zip.blockmap
            artifacts/test-reports/packageability/macos-arm64/${{ github.sha }}/report.json
            artifacts/test-reports/packaged-memory/macos-arm64/${{ github.sha }}/report.json
          if-no-files-found: error
          retention-days: 14

  macos-arm64-distribution:
    name: macOS 26 arm64 downloaded distribution
    needs: macos-arm64
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout verifier
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.0"
          cache: npm

      - name: Install verifier dependencies
        run: npm ci

      - name: Download electron-builder distribution
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: pige-macos-arm64-packageability-${{ github.sha }}
          path: artifacts

      - name: Verify downloaded macOS distribution
        run: npm run smoke:distributed:mac:arm64
        env:
          PIGE_REPORT_BUILD_ID: ${{ github.sha }}-distribution
          PIGE_EXPECTED_PACKAGEABILITY_REPORT: artifacts/test-reports/packageability/macos-arm64/${{ github.sha }}/report.json

      - name: Upload independent distribution evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pige-macos-arm64-distribution-verification-${{ github.sha }}
          path: artifacts/test-reports/packageability/macos-arm64/${{ github.sha }}-distribution/report.json
          if-no-files-found: error
          retention-days: 14

  windows-x64:
    name: Windows x64 packageability
    runs-on: windows-2025
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.0"
          cache: npm

      - name: Install
        run: npm ci

      - name: Audit packaged runtime dependencies
        run: npm audit --omit=dev

      - name: Build unsigned Windows x64 artifact
        run: npm run package:dir:win:x64

      - name: Smoke packaged application
        run: npm run smoke:packaged:win:x64
        env:
          PIGE_REPORT_BUILD_ID: ${{ github.sha }}

      - name: Measure packaged application memory
        run: npm run evidence:packaged-memory:win:x64
        env:
          PIGE_REPORT_BUILD_ID: ${{ github.sha }}

      - name: Upload packageability evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pige-windows-x64-packageability-${{ github.sha }}
          path: |
            artifacts/release-packageability/windows-x64/Pige-0.0.0-x64-setup.exe
            artifacts/test-reports/packageability/windows-x64/${{ github.sha }}/report.json
            artifacts/test-reports/packaged-memory/windows-x64/${{ github.sha }}/report.json
          if-no-files-found: error
          retention-days: 14
