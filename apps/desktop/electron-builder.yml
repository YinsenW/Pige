appId: com.yinsenw.pige
productName: Pige
forceCodeSigning: false
asar: true
asarUnpack:
  - "**/*.node"
directories:
  output: ../../artifacts/release-packageability/macos-arm64
files:
  - out/**
  - package.json
  - "!out/main/unified-agent-roundtrip-smoke.js"
extraResources:
  - from: ../../LICENSE
    to: LICENSE
  - from: ../../NOTICE
    to: NOTICE
  - from: ../../resources/licenses
    to: licenses
  - from: ../../resources/toolchain-manifest
    to: toolchain-manifest
  - from: ../../artifacts/release-packageability/package-resources
    to: release
mac:
  category: public.app-category.productivity
  icon: ../../resources/brand/pige-icon/macos/Pige.icns
  artifactName: Pige-${version}-${arch}.${ext}
  extraResources:
    - from: ../../artifacts/native/macos/arm64
      to: native/macos/arm64
  target:
    - dir
    - zip
  identity: "-"
  sign: ../../scripts/release/sign-macos-ad-hoc.mjs
  hardenedRuntime: false
  notarize: false
  entitlements: null
  entitlementsInherit: null
  preAutoEntitlements: false
  strictVerify: true
win:
  icon: ../../resources/brand/pige-icon/windows/Pige.ico
  artifactName: Pige-${version}-${arch}-setup.${ext}
  target:
    - dir
    - nsis
nsis:
  artifactName: Pige-${version}-${arch}-setup.${ext}
  oneClick: false
  perMachine: false
  allowElevation: false
  allowToChangeInstallationDirectory: true
