<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pige UI viewport review harness</title>
  <style>
    * { box-sizing: border-box; }
    html, body { min-height: 100%; margin: 0; }
    body {
      display: grid;
      place-items: safe center;
      padding: 16px;
      overflow: auto;
      background: #050505;
      color: #fff;
      font: 12px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .review-frame {
      position: relative;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 28px 90px rgba(0,0,0,.45);
    }
    iframe { display: block; width: 100%; height: 100%; border: 0; background: #fff; }
    output {
      position: fixed;
      right: 10px;
      bottom: 10px;
      padding: 5px 8px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 9999px;
      background: rgba(24,24,24,.86);
      color: rgba(255,255,255,.72);
      backdrop-filter: blur(12px);
    }
  </style>
</head>
<body>
  <main class="review-frame" id="reviewFrame">
    <iframe id="prototypeFrame" title="Pige 指定视口原型"></iframe>
  </main>
  <output id="viewportLabel"></output>
  <script>
    const params = new URLSearchParams(location.search);
    const width = Math.min(1536, Math.max(320, Number(params.get('width')) || 680));
    const height = Math.min(1200, Math.max(568, Number(params.get('height')) || 680));
    const route = params.get('route') || '?screen=home';
    const safeRoute = route.startsWith('?') ? route : '?screen=home';
    const reviewFrame = document.querySelector('#reviewFrame');
    reviewFrame.style.width = `${width}px`;
    reviewFrame.style.height = `${height}px`;
    document.querySelector('#prototypeFrame').src = `./index.html${safeRoute}`;
    const viewportLabel = document.querySelector('#viewportLabel');
    viewportLabel.value = `${width} × ${height} · ${safeRoute}`;
    viewportLabel.hidden = params.get('label') === '0';
  </script>
</body>
</html>
